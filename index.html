<This will be a dungeon crawling or lite rpg game with simple text based commands and outputs,
mostly centered around a fighting game loop. I have not decided on a theme yet, the stock image of a castle is a placeholder.
There will be a clear goal, with very limited npc interaction or anything like that, mainly centered around upgrading
gear, fighting, getting rich or something. The combat system will be a typical turn based, with an attack option, possibly? defend,
perhaps specific attack types costing AP, item usage, etc etc.>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id = "game-container">
        <div id = "location">
            <img src  = "image/Castle.png" alt = "Castle" width = 80% height = auto class = "float-left">
        </div>
        <div id = "textNarration"> 
            <p3 id = "eventText"> 
                default_text
            </p3>
            <p3 id = "choices"> 
                default_choices
            </p3>
        </div>
        <input id = "playerChoice" name = "playerChoice" type = "text">
    </div>
     <div id = "sidebar">
        <p>Your Character</p>
        <p id = "characterName" >Bobby Joe Bob</p>
        <p id = "level" >Level 1 Useless Guy</p>
        <p id = "hp" >HP: 100/100</p>
        <p id = "ap" >AP: 100/100</p>
        <p id = "coins" >Coins: 1000</p>
        <button id = "checkStatus" >Check Status</button> <br>
        <button id = "viewInventory" >View Inventory</button> <br>
        <button id = "viewQuests" >View Quests</button><br>
        <p id = "statusDisplay" >Your Status/Inventory/Quests will appear here...</p>
    </div>
</body>
</html>
