<This will be a dungeon crawling or lite rpg game with simple text based commands and outputs,
mostly centered around a fighting game loop. I have not decided on a theme yet, the stock image of a castle is a placeholder.
There will be a clear goal, with very limited npc interaction or anything like that, mainly centered around upgrading
gear, fighting, getting rich or something. The combat system will be a typical turn based, with an attack option, possibly? defend,
perhaps specific attack types costing AP, item usage, etc etc.>
